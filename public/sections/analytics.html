<div class="page-wrap" style="animation: fadeUp 0.3s ease both">

  <div class="page-header">
    <div>

      <div class="page-subtitle">Real-time matrix · Basic Value · Select month &amp; year to generate</div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="card" style="margin-bottom:16px">
    <div class="card-body" style="padding:20px 24px">
      <div style="display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end">

        <div class="field" style="margin:0;min-width:160px">
          <label class="field-label" for="dash-month">Month</label>
          <select class="field-select" id="dash-month">
            <option value="">— Select —</option>
            <option value="JAN">January</option>
            <option value="FEB">February</option>
            <option value="MAR">March</option>
            <option value="APR">April</option>
            <option value="MAY">May</option>
            <option value="JUN">June</option>
            <option value="JUL">July</option>
            <option value="AUG">August</option>
            <option value="SEP">September</option>
            <option value="OCT">October</option>
            <option value="NOV">November</option>
            <option value="DEC">December</option>
          </select>
        </div>

        <div class="field" style="margin:0;min-width:110px">
          <label class="field-label" for="dash-year">Year</label>
          <input class="field-input" id="dash-year" type="number" min="2020" max="2100" placeholder="2026" />
        </div>

        <div>
          <button class="btn btn-primary" id="dash-generate" type="button" style="height:40px">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Generate Matrix
          </button>
        </div>

        <div>
          <button class="btn btn-ghost" id="dash-dl" type="button" style="height:40px;display:none">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export XLSX
          </button>
        </div>


      </div>
    </div>
  </div>

  <!-- LOADING -->
  <div id="dash-loading" style="display:none">
    <div class="card">
      <div class="card-body">
        <div class="empty-state" style="padding:48px">
          <div class="loader-ring" style="margin:0 auto 16px"></div>
          <div class="empty-title">Calculating matrix…</div>
          <div class="empty-sub">Reading data from all agent sheets</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ERROR -->
  <div id="dash-err" style="display:none">
    <div class="card">
      <div class="card-body">
        <div class="empty-state" style="padding:48px">
          <div style="font-size:28px;opacity:.4;margin-bottom:12px">⚠</div>
          <div class="empty-title" style="color:#E05C6A">Something went wrong</div>
          <div id="dash-err-msg" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(224,92,106,.8);margin-top:8px;word-break:break-word"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- OUTPUT -->
  <div id="dash-output" style="display:none">
    <div class="card">
      <div class="card-body" style="padding:0;overflow-x:auto">
      </div>
    </div>
  </div>

  <!-- IDLE -->
  <div id="dash-idle">
    <div class="card">
      <div class="card-body">
        <div class="empty-state" style="padding:60px">
          <div class="empty-icon">📊</div>
          <div class="empty-title">Select Month &amp; Year to Generate</div>
          <div class="empty-sub">Matrix will be calculated in real-time from REC_STK · REC_TD · PRIM_SALE · GRC tabs</div>
        </div>
      </div>
    </div>
  </div>

</div>
